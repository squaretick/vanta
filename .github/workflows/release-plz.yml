name: release-plz

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  # Publish crates to crates.io + create the `vanta` tag/release when a
  # release PR is merged.
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - uses: dtolnay/rust-toolchain@stable
      - uses: release-plz/action@v0.5
        with:
          command: release
        env:
          # A fine-grained PAT (secret RELEASE_PLZ_TOKEN) is required so the tag
          # release-plz pushes triggers `release-binaries.yml`. A tag pushed with
          # the default GITHUB_TOKEN does NOT trigger other workflows, which left
          # the v0.0.2 Release with no binary assets. Falls back to GITHUB_TOKEN.
          GITHUB_TOKEN: ${{ secrets.RELEASE_PLZ_TOKEN || secrets.GITHUB_TOKEN }}
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
          # crates.io index fetches over HTTP/2 intermittently hit
          # `[16] Error in the HTTP2 framing layer`. Force HTTP/1.1 and retry
          # transient network errors so a flake mid-publish doesn't abort.
          CARGO_NET_HTTP_MULTIPLEXING: "false"
          CARGO_NET_RETRY: "10"

  # Keep an up-to-date release PR (version bumps + changelogs) open on main.
  release-pr:
    runs-on: ubuntu-latest
    concurrency:
      group: release-plz-pr
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - uses: dtolnay/rust-toolchain@stable
      - uses: release-plz/action@v0.5
        with:
          command: release-pr
        env:
          # A fine-grained PAT (secret RELEASE_PLZ_TOKEN) lets the release PR
          # trigger CI; GITHUB_TOKEN alone cannot. Falls back to GITHUB_TOKEN.
          GITHUB_TOKEN: ${{ secrets.RELEASE_PLZ_TOKEN || secrets.GITHUB_TOKEN }}
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
          CARGO_NET_HTTP_MULTIPLEXING: "false"
          CARGO_NET_RETRY: "10"
