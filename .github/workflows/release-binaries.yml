name: release-binaries

# Attach prebuilt, cross-platform binaries to the GitHub Release that
# release-plz creates for each `v*` tag. release-plz (release-plz.yml) pushes
# the tag and opens the Release; this workflow fires on that tag push and
# uploads one archive per target plus a `.sha256` checksum that scripts/install.sh
# verifies. Keep the matrix in sync with scripts/install.sh's target mapping.
#
# Binaries shipped: vanta, vt (the short alias), and vanta-shim (the per-tool
# shim helper). All three are bundled into a single archive per target.

on:
  push:
    tags: ["v*"]
  # Manual backfill: build/upload binaries for an already-published tag (e.g. a
  # release whose tag was pushed by GITHUB_TOKEN, which can't trigger this
  # workflow automatically). Run with the tag name, e.g. `v0.0.2`.
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing tag to build and upload binaries for (e.g. v0.0.2)"
        required: true

permissions:
  contents: write

jobs:
  upload-binaries:
    name: ${{ matrix.target }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { target: x86_64-unknown-linux-gnu, os: ubuntu-latest }
          - { target: aarch64-unknown-linux-gnu, os: ubuntu-24.04-arm }
          - { target: x86_64-unknown-linux-musl, os: ubuntu-latest }
          - { target: x86_64-apple-darwin, os: macos-13 }
          - { target: aarch64-apple-darwin, os: macos-14 }
          - { target: x86_64-pc-windows-msvc, os: windows-latest }
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v5
        with:
          # On tag push this is empty → defaults to the triggering tag. On
          # manual dispatch, check out the requested tag.
          ref: ${{ github.event.inputs.tag || github.ref }}

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      # musl needs a static C toolchain for crates with C dependencies.
      - name: Install musl tools
        if: contains(matrix.target, 'musl')
        run: sudo apt-get update && sudo apt-get install -y musl-tools

      # Cross-compiles, builds in release, tars (unix) / zips (windows),
      # generates a SHA256 checksum file, and uploads everything to the
      # Release for the tag that triggered this run.
      - uses: taiki-e/upload-rust-binary-action@v1
        with:
          bin: vanta,vt,vanta-shim
          target: ${{ matrix.target }}
          archive: vanta-$tag-$target
          # Pin the tag explicitly so `$tag` and the upload target are correct
          # for both tag-push and manual-dispatch runs.
          ref: refs/tags/${{ github.event.inputs.tag || github.ref_name }}
          checksum: sha256
          token: ${{ secrets.GITHUB_TOKEN }}
