name: release

on:
  push:
    tags: ["v*.*.*"]
  # Manual backfill for an already-published tag whose push didn't trigger this
  # workflow (e.g. tag pushed by GITHUB_TOKEN). Run from main with the tag name.
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing tag to build packages/image for (e.g. v0.0.3)"
        required: true

permissions:
  contents: write
  packages: write

jobs:
  # NOTE: cross-platform binary archives (vanta, vt, vanta-shim) + SHA256
  # checksums are produced by .github/workflows/release-binaries.yml, which
  # also runs on the `v*` tag. This workflow handles OS packages and the
  # container image only.

  # Debian/Ubuntu .deb and RHEL/Fedora .rpm, attached to the release.
  packages:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo build --release --locked --bin vanta --bin vt --bin vanta-shim
      - run: cargo install cargo-deb cargo-generate-rpm
      - run: cargo deb -p vanta --no-build
      - run: cargo generate-rpm -p crates/vanta
      # Stable filenames so `releases/latest/download/...` URLs are predictable.
      - run: |
          cp target/debian/*.deb vanta_amd64.deb
          cp target/generate-rpm/*.rpm vanta.x86_64.rpm
      - uses: softprops/action-gh-release@v2
        with:
          # Explicit tag so the upload targets the right release on both
          # tag-push and manual-dispatch runs.
          tag_name: ${{ github.event.inputs.tag || github.ref_name }}
          files: |
            target/debian/*.deb
            target/generate-rpm/*.rpm
            vanta_amd64.deb
            vanta.x86_64.rpm

  # Multi-arch container image to GHCR.
  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ghcr.io/squaretick/vanta
          # value= makes the version explicit so it resolves on manual-dispatch
          # runs too (where github.ref is a branch, not the tag).
          tags: |
            type=semver,pattern={{version}},value=${{ github.event.inputs.tag || github.ref_name }}
            type=raw,value=latest
      - uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
