name: release

on:
  push:
    tags: ["v*.*.*"]

permissions:
  contents: write
  packages: write

jobs:
  # Cross-platform binaries (vanta + vanta-shim), archived and attached to the release.
  binaries:
    strategy:
      fail-fast: false
      matrix:
        include:
          - { target: x86_64-unknown-linux-gnu, os: ubuntu-latest }
          - { target: aarch64-unknown-linux-gnu, os: ubuntu-24.04-arm }
          - { target: x86_64-apple-darwin, os: macos-13 }
          - { target: aarch64-apple-darwin, os: macos-14 }
          - { target: x86_64-pc-windows-msvc, os: windows-latest }
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: taiki-e/upload-rust-binary-action@v1
        with:
          bin: vanta,vanta-shim
          target: ${{ matrix.target }}
          archive: vanta-$tag-$target
          checksum: sha256
          token: ${{ secrets.GITHUB_TOKEN }}

  # Debian/Ubuntu .deb and RHEL/Fedora .rpm, attached to the release.
  packages:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo build --release --locked --bin vanta --bin vt --bin vanta-shim
      - run: cargo install cargo-deb cargo-generate-rpm
      - run: cargo deb -p vanta --no-build
      - run: cargo generate-rpm -p crates/vanta
      # Stable filenames so `releases/latest/download/...` URLs are predictable.
      - run: |
          cp target/debian/*.deb vanta_amd64.deb
          cp target/generate-rpm/*.rpm vanta.x86_64.rpm
      - uses: softprops/action-gh-release@v2
        with:
          files: |
            target/debian/*.deb
            target/generate-rpm/*.rpm
            vanta_amd64.deb
            vanta.x86_64.rpm

  # Multi-arch container image to GHCR.
  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ghcr.io/squaretick/vanta
          tags: |
            type=semver,pattern={{version}}
            type=raw,value=latest
      - uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
