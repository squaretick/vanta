# cargo-deny policy: license allow-list, advisory denial, dependency bans.

[advisories]
version = 2
yanked = "deny"
ignore = []

[licenses]
version = 2
allow = [
    "Apache-2.0",
    # Cranelift and wasmtime (the provider sandbox) carry the LLVM exception on
    # top of Apache-2.0.
    "Apache-2.0 WITH LLVM-exception",
    "MIT",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-3.0",
    "Zlib",
    # webpki-roots ships Mozilla's CA bundle (data, not code) under the Community
    # Data License Agreement; pulled in transitively by the rustls TLS stack.
    "CDLA-Permissive-2.0",
]
confidence-threshold = 0.9

[bans]
multiple-versions = "warn"
# All external dependencies are version-pinned in [workspace.dependencies]; the
# only unversioned ("wildcard") requirements are the first-party `vanta-*` path
# deps, so the wildcard check is allowed rather than fighting it per-crate.
wildcards = "allow"
# rustls only: no OpenSSL anywhere in the tree.
deny = [
    { name = "openssl" },
    { name = "openssl-sys" },
]

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
