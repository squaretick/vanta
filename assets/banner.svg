<svg xmlns="http://www.w3.org/2000/svg" width="820" height="200" viewBox="0 0 820 200" role="img" aria-label="Vanta — every developer tool, one command">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0a0a12"/>
      <stop offset="1" stop-color="#15101f"/>
    </linearGradient>
    <linearGradient id="ink" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#a78bfa"/>
      <stop offset="0.5" stop-color="#8b5cf6"/>
      <stop offset="1" stop-color="#6366f1"/>
    </linearGradient>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="6" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="820" height="200" rx="16" fill="url(#bg)"/>
  <rect x="1" y="1" width="818" height="198" rx="15" fill="none" stroke="#8b5cf6" stroke-opacity="0.25">
    <animate attributeName="stroke-opacity" values="0.12;0.45;0.12" dur="3.2s" repeatCount="indefinite"/>
  </rect>

  <!-- pulsing prompt dot -->
  <circle cx="70" cy="100" r="9" fill="#8b5cf6" filter="url(#glow)">
    <animate attributeName="r" values="7;11;7" dur="1.8s" repeatCount="indefinite"/>
    <animate attributeName="fill-opacity" values="0.55;1;0.55" dur="1.8s" repeatCount="indefinite"/>
  </circle>

  <!-- title with breathing glow -->
  <g filter="url(#glow)">
    <text x="110" y="108" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="62" font-weight="700" letter-spacing="6" fill="url(#ink)">
      VANTA
      <animate attributeName="fill-opacity" values="0.78;1;0.78" dur="2.6s" repeatCount="indefinite"/>
    </text>
  </g>

  <!-- description -->
  <text x="112" y="146" font-family="ui-sans-serif, system-ui, Segoe UI, Helvetica, Arial" font-size="19" fill="#c4b5fd">Every developer tool, one command.</text>
  <text x="112" y="172" font-family="ui-sans-serif, system-ui, Segoe UI, Helvetica, Arial" font-size="14" fill="#7c7596">Reproducible · minisign-signed · cross-platform · one static binary</text>
</svg>
